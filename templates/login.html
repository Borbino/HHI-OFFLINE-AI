<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HD현대중공업 기술교육원 - 로그인</title>
    <style>
        @font-face { font-family: 'HDFont'; src: url('/static/HD-Light OTF.otf') format('opentype'); font-weight: 300; }
        @font-face { font-family: 'HDFont'; src: url('/static/HD-Medium OTF.otf') format('opentype'); font-weight: 500; }
        @font-face { font-family: 'HDFont'; src: url('/static/HD-Bold OTF.otf') format('opentype'); font-weight: 700; }

        * { font-family: 'HDFont', sans-serif; }

        body {
            background: linear-gradient(135deg, #002A5C 0%, #001A38 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            margin: 0; color: white;
        }
        .login-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            /* 헤더(로고+타이틀) 너비에 자동 맞춤 */
            width: fit-content; min-width: 340px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-title {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin-bottom: 10px; white-space: nowrap;
        }
        /* 로고: 56px의 80% = 45px */
        .header-title img {
            width: 45px; height: 45px; object-fit: contain; flex-shrink: 0;
        }
        h2 {
            margin: 0; font-weight: 700;
            letter-spacing: -0.5px; font-size: 2.0rem; line-height: 1.2;
            white-space: nowrap;
        }
        .subtitle {
            text-align: center; font-size: 1.2rem; opacity: 0.75;
            margin-bottom: 28px; margin-top: 8px; font-weight: 300;
        }
        input {
            width: 100%; padding: 13px 16px; margin-bottom: 14px; border: none;
            border-radius: 8px; background: rgba(255,255,255,0.9); font-size: 1rem;
            color: #1E293B; box-sizing: border-box; outline: none; font-weight: 500;
        }
        input:focus { background: white; }
        .login-btn {
            width: 100%; padding: 14px; background: #00823F; color: white;
            border: none; border-radius: 8px; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .login-btn:hover { background: #006830; }
        .login-btn:active { transform: scale(0.97); }
        .error-msg { color: #FCA5A5; font-size: 0.9rem; text-align: center; margin-top: 12px; min-height: 20px; font-weight: 300; }
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header-title">
            <img src="/static/로고-Photoroom.png" alt="HD현대중공업 로고">
            <h2>HD현대중공업 기술교육원</h2>
        </div>
        <p class="subtitle">LocalHost LLM System</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="text" id="emp_id" placeholder="사번을 입력하세요" autocomplete="username" required>
            <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">로그인</span>
            </button>
        </form>
        <div class="error-msg" id="errorMsg"></div>
    </div>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');
            btnText.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
            errorMsg.textContent = '';
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        emp_id: document.getElementById('emp_id').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || '사번 또는 비밀번호가 올바르지 않습니다.';
                    btnText.textContent = '로그인';
                    btn.disabled = false;
                }
            } catch(err) {
                errorMsg.textContent = '서버 연결에 실패했습니다.';
                btnText.textContent = '로그인';
                btn.disabled = false;
            }
        }
        document.getElementById('emp_id').focus();
    </script>
</body>
</html>
